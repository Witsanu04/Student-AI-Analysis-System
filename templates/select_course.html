<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Select Course</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(rgba(10, 20, 40, 0.8), rgba(10, 20, 40, 0.8)),
            url("/static/bu.jpg");
            background-size: cover; background-position: center;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0;
        }
        .select-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 50px; border-radius: 30px; text-align: center; color: white;
            border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .course-btn {
            display: block; width: 300px; padding: 20px; margin: 15px auto;
            background: rgba(255,255,255,0.1); color: white; text-decoration: none;
            border-radius: 15px; font-weight: 600; font-size: 1.2em;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.3);
        }
        .course-btn:hover { background: #00d2ff; color: #000; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="select-card">
        <h1>🎓 BU Student AI Portal</h1>
        <p>กรุณาเลือกรายวิชาเพื่อเข้าตรวจสอบข้อมูล</p>
        {% for c in courses %}
            <a href="/course/{{ c }}" class="course-btn">รายวิชา {{ c }}</a>
        {% endfor %}
    </div>
</body>
</html>
